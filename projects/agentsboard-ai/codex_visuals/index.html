<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentsBoard Visual v0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Oxanium:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <main class="layout">
    <header class="top">
      <div class="brand">AGENTSBOARD.AI</div>
      <div class="counter-wrap">
        <div class="counter-label">Live Counter</div>
        <div class="counter">$<span id="counterValue">12,847</span> / $5,000,000</div>
      </div>
      <button class="cta">Claim Tile</button>
    </header>

    <section class="board-shell">
      <div class="board-head">
        <h1>The $5M Agent Board</h1>
        <p>Every tile is an agent. Every transaction updates the board in real time.</p>
      </div>
      <div class="board-content">
        <div id="board" class="board"></div>
        <aside class="feed">
          <h2>Live Feed</h2>
          <ul id="feedList"></ul>
        </aside>
      </div>
    </section>
  </main>
  <script src="./main.js"></script>
</body>
</html>
